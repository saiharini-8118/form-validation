<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Creative Form Validation</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="form.css">
</head>
<body>

  <!-- INTRO SECTION -->
  <section class="hero-section">

    <div class="hero-content">

      <h1>Welcome to Smart Registration Portal</h1>

      <p>
        A modern JavaScript Form Validation Project
        with interactive UI and secure validation.
      </p>

      <a href="#registerSection" class="btn btn-light btn-lg">
        Register Now
      </a>

    </div>

  </section>

  <!-- FORM SECTION -->
  <section id="registerSection" class="form-section">

    <div class="form-box">

      <h2 class="text-center mb-4">Registration Form</h2>

      <form id="myForm">

        <!-- Full Name -->
        <div class="mb-3">

          <label class="form-label">Full Name</label>

          <input
            type="text"
            class="form-control"
            id="fullName"
            placeholder="Enter your full name"
          >

          <small class="error" id="nameError"></small>

        </div>

        <!-- Email -->
        <div class="mb-3">

          <label class="form-label">Email ID</label>

          <input
            type="text"
            class="form-control"
            id="email"
            placeholder="Enter your email"
          >

          <small class="error" id="emailError"></small>

        </div>

        <!-- Phone -->
        <div class="mb-3">

          <label class="form-label">Phone Number</label>

          <input
            type="text"
            class="form-control"
            id="phone"
            placeholder="Enter your phone number"
          >

          <small class="error" id="phoneError"></small>

        </div>

        <!-- Password -->
        <div class="mb-3">

          <label class="form-label">Password</label>

          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Enter password"
          >

          <small class="error" id="passwordError"></small>

        </div>

        <!-- Confirm Password -->
        <div class="mb-3">

          <label class="form-label">Confirm Password</label>

          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            placeholder="Confirm password"
          >

          <small class="error" id="confirmError"></small>

        </div>

        <button type="submit" class="btn btn-primary w-100">
          Register
        </button>

      </form>

    </div>

  </section>

  <script src="form.js"></script>

</body>
</html>
